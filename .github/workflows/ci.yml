name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler
      - name: Check
        working-directory: compiler
        run: cargo check
      - name: Run tests
        working-directory: compiler
        run: cargo test
      - name: Build release
        working-directory: compiler
        run: cargo build --release
